repos:
  - repo: https://github.com/psf/black
    rev: 23.3.0  # Replace with the latest version
    hooks:
      - id: black
        args: ["--line-length=79"]

  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0  # Replace with the latest version
    hooks:
      - id: isort
        args: ["--profile=black", "--line-length=79"]

  - repo: https://github.com/PyCQA/flake8
    rev: 6.0.0  # Replace with the latest version
    hooks:
      - id: flake8
        args: ["--max-line-length=79", "--extend-ignore=E203"]